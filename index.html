<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うんこよけ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  body {
    font-family:"BIZ UDPGothic", sans-serif;
    height:100vh; overflow:hidden;
    background:linear-gradient(180deg,#aee9ff 0%,#d9f5ff 55%,#b7e892 55%,#8fd66a 100%);
    display:flex; align-items:center; justify-content:center;
  }
  #game {
    position:relative; width:100%; height:100%; max-width:480px;
    overflow:hidden; touch-action:none;
    background:linear-gradient(180deg,#aee9ff 0%,#d9f5ff 60%,#b7e892 60%,#8fd66a 100%);
    box-shadow:0 0 40px rgba(0,0,0,.15);
  }
  .cloud{ position:absolute; background:#fff; border-radius:50%; opacity:.8; filter:blur(1px); }
  #player{
    position:absolute; bottom:10px; width:62px; height:auto;
    transform:translateX(-50%); z-index:5;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));
  }
  #player img{ width:100%; display:block; }
  .poop{ position:absolute; z-index:4; will-change:top; }
  #hud{
    position:absolute; top:10px; left:0; width:100%;
    display:flex; justify-content:space-between; padding:0 16px;
    font-weight:bold; color:#5a3a1a; text-shadow:0 1px 0 #fff; font-size:18px; z-index:10;
  }
  #lvl{
    position:absolute; top:38px; width:100%; text-align:center;
    font-weight:bold; color:#264AF4; text-shadow:0 1px 0 #fff; font-size:14px; z-index:10;
  }
  #overlay{
    position:absolute; inset:0; z-index:20;
    background:rgba(0,0,0,.45); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    text-align:center; padding:20px;
  }
  #overlay h1{ font-size:30px; text-shadow:0 2px 0 #00118F; }
  #overlay p{ font-size:16px; line-height:1.6; }
  #overlay.hidden{ display:none; }
  button{
    font-family:inherit; font-size:18px; font-weight:bold;
    padding:12px 28px; border:none; border-radius:28px;
    background:#264AF4; color:#fff; box-shadow:0 4px 0 #00118F; cursor:pointer;
  }
  button:active{ transform:translateY(3px); box-shadow:0 1px 0 #00118F; }
  #flash{ position:absolute; inset:0; background:#fff; opacity:0; z-index:15; pointer-events:none; }
  .rank{ background:rgba(255,255,255,.15); border-radius:12px; padding:10px 16px; font-size:14px; line-height:1.5; }
  .rank ol{ text-align:left; margin:6px 0 0; padding-left:24px; }
  .rank li{ margin:2px 0; }
</style>
</head>

const SUPABASE_URL = 'https://ykfaqtzxtfornkcrkjuu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZmFxdHp4dGZvcm5rY3JranV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDE4MDgsImV4cCI6MjA5Nzg3NzgwOH0.wQEY1DK0IJGW35WJ_KbcVnvfBS0Am8vRV4GrY4KH900';
const RANKING_ENABLED = !SUPABASE_URL.includes('YOUR-PROJECT'); // 未設定なら自動でオフ

async function submitScore(name, sc){
  if(!RANKING_ENABLED) return;
  try{
    await fetch(SUPABASE_URL + '/rest/v1/scores', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Prefer':'return=minimal'
      },
      body:JSON.stringify({name:name.slice(0,12), score:sc})
    });
  }catch(e){ console.warn('submit failed', e); }
}

async function fetchRanking(){
  if(!RANKING_ENABLED) return [];
  try{
    const res = await fetch(SUPABASE_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=10', {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY }
    });
    return await res.json();
  }catch(e){ console.warn('fetch failed', e); return []; }
}

function rankingHTML(rows){
  if(!RANKING_ENABLED) return '';
  if(!rows || rows.length===0) return '<div class="rank"><b>🏆 ランキング</b><br><span style="font-size:13px">まだ記録がありません</span></div>';
  let h = '<div class="rank"><b>🏆 ランキング TOP10</b><ol>';
  rows.forEach(r=>{ h += `<li>${escapeHTML(r.name||'???')} … ${r.score}</li>`; });
  h += '</ol></div>';
  return h;
}
function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    return `<ellipse cx="23" cy="46" rx="20" ry="8" fill="${c[0]}"/>
      <ellipse cx="23" cy="36" rx="16" ry="7" fill="${c[1]}"/>
      <ellipse cx="23" cy="26" rx="12" ry="6" fill="${c[1]}"/>
      <ellipse cx="23" cy="17" rx="8" ry="5" fill="${c[2]}"/>
      <path d="M23 4 q-4 4 0 8 q4-4 0-8Z" fill="${c[2]}"/>`;
  }
  if(type==='blob'){ // まんまる
    return `<ellipse cx="23" cy="38" rx="20" ry="14" fill="${c[0]}"/>
      <ellipse cx="23" cy="26" rx="15" ry="11" fill="${c[1]}"/>
      <ellipse cx="19" cy="20" rx="6" ry="4" fill="#fff" opacity=".3"/>`;
  }
  if(type==='spiky'){ // とげとげ
    return `<ellipse cx="23" cy="42" rx="20" ry="8" fill="${c[0]}"/>
      <ellipse cx="23" cy="30" rx="15" ry="8" fill="${c[1]}"/>
      <ellipse cx="23" cy="20" rx="10" ry="6" fill="${c[2]}"/>
      <path d="M8 30 l-5-6 6 3Z M38 30 l5-6-6 3Z M14 16 l-3-7 5 5Z M32 16 l3-7-5 5Z" fill="${c[1]}"/>`;
  }
  // standard 3段
  return `<ellipse cx="23" cy="42" rx="21" ry="9" fill="${c[0]}"/>
    <ellipse cx="23" cy="30" rx="16" ry="8" fill="${c[1]}"/>
    <ellipse cx="23" cy="19" rx="10" ry="6" fill="${c[2]}"/>
    <path d="M23 6 q-5 4 0 8 q5-4 0-8Z" fill="${c[2]}"/>`;
}

function makePoopSVG(type, c, gold){
  const star = gold ? `<text x="23" y="14" font-size="14" text-anchor="middle">✨</text>` : '';
  return `<svg viewBox="0 0 46 52" width="100%" height="100%">
    ${poopShape(type, c)}
    <circle cx="18" cy="30" r="3.2" fill="#fff"/><circle cx="28" cy="30" r="3.2" fill="#fff"/>
    <circle cx="19" cy="31" r="1.6" fill="#222"/><circle cx="29" cy="31" r="1.6" fill="#222"/>
    ${star}
  </svg>`;
}

function start(){
  overlay.classList.add('hidden');
  playerX = W/2; score = 0; running = true; level = 1;
  lives = 1; invuln = 0; updateLives();
  poops = []; spawnInterval = 950; fallBase = 0.17;
  startTime = performance.now(); lastTime = startTime; spawnTimer = 0;
  player.style.left = playerX + 'px';
  lvlEl.textContent = 'レベル 1';
  document.querySelectorAll('.poop').forEach(p=>p.remove());
  requestAnimationFrame(loop);
}

const SHAPES = ['standard','tall','blob','spiky'];

function spawn(elapsed){
  // 基本サイズ46。たまに大小ランダム
  let size = 46, c = COLORS[0], shape='standard', gold=false;
  // 8%の確率で金のうんこ（とるとハート+1）
  if(Math.random() < 0.08){
    c = COLORS[4]; shape = 'standard'; gold = true; size = 50;
  } else if(Math.random() < 0.20 + Math.min(0.2, elapsed*0.004)){
    // へんなうんこ（金以外の色・形・サイズ）
    const others = [0,1,2,3,5];
    c = COLORS[others[Math.floor(Math.random()*others.length)]];
    shape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
    const r = Math.random();
    if(r < 0.4) size = 30 + Math.random()*8;       // 小
    else if(r > 0.75) size = 64 + Math.random()*26; // 大
  }
  const w = size, h = size*52/46;
  const el = document.createElement('div');
  el.className = 'poop';
  el.style.width = w+'px'; el.style.height = h+'px';
  if(gold) el.style.filter = 'drop-shadow(0 0 6px #ffd24d)';
  el.innerHTML = makePoopSVG(shape, c, gold);
  const px = Math.random()*(W-w);
  el.style.left = px + 'px';
  el.style.top = '-'+h+'px';
  game.appendChild(el);
  const sizeFactor = 46/size;
  poops.push({el, x:px, y:-h, w, h, gold, vy: (fallBase + Math.random()*0.12) * (0.7+0.5*sizeFactor)});
}

function loop(now){
  if(!running) return;
  const dt = now - lastTime; lastTime = now;
  const elapsed = (now - startTime)/1000;
  score = Math.floor(elapsed);
  scoreEl.textContent = 'スコア ' + score;

  // レベル＝10秒ごとに上昇
  const newLevel = 1 + Math.floor(elapsed/10);
  if(newLevel !== level){ level = newLevel; lvlEl.textContent = 'レベル ' + level; }

  // 量を増やす：出現間隔をどんどん短く
  spawnInterval = Math.max(170, 950 - elapsed*32);
  fallBase = 0.17 + elapsed*0.007;

  spawnTimer += dt;
  if(spawnTimer > spawnInterval){
    spawnTimer = 0;
    spawn(elapsed);
    // 後半は1回に複数体まとめて降らせる
    if(elapsed > 25 && Math.random()<0.5) spawn(elapsed);
    if(elapsed > 45 && Math.random()<0.5) spawn(elapsed);
  }

  if(invuln>0) invuln -= dt;

  const pw = player.clientWidth, ph = player.clientHeight;
  const pLeft = playerX - pw*0.32, pRight = playerX + pw*0.32;
  const pTop = H - 10 - ph*0.85;

  for(let i=poops.length-1; i>=0; i--){
    const p = poops[i];
    p.y += p.vy * dt;
    p.el.style.top = p.y + 'px';
    const cx = p.x + p.w/2, cy = p.y + p.h*0.78;
    const r = p.w*0.32;
    if(cy > pTop && cy < H-10 && cx+r > pLeft && cx-r < pRight){
      if(p.gold){
        lives++; updateLives();
        flash.style.background = '#ffe98a';
        flash.animate([{opacity:.6},{opacity:0}],{duration:300});
        p.el.remove(); poops.splice(i,1); continue;
      } else {
        if(invuln > 0){ continue; } // 無敵中は素通り
        lives--; updateLives();
        flash.style.background = '#fff';
        flash.animate([{opacity:.85},{opacity:0}],{duration:400});
        invuln = 600;
        p.el.remove(); poops.splice(i,1);
        if(lives <= 0){ gameOver(); return; }
        continue;
      }
    }
    if(p.y > H){ p.el.remove(); poops.splice(i,1); }
  }
  requestAnimationFrame(loop);
}

async function gameOver(){
  running = false;
  flash.style.background = '#fff';
  flash.animate([{opacity:.85},{opacity:0}],{duration:400});
  if(score > best){ best = score; bestEl.textContent = 'ベスト ' + best; }
  overlay.classList.remove('hidden');

  if(!RANKING_ENABLED){
    overlay.innerHTML = `<h1>うんこ命中！</h1>
      <p>スコア：${score} びょう（レベル ${level}）<br>ベスト：${best} びょう</p>
      <button id="startBtn">もういちど</button>`;
    document.getElementById('startBtn').onclick = start;
    return;
  }

  // ランキングあり：名前入力 → 送信 → TOP10表示
  overlay.innerHTML = `<h1>うんこ命中！</h1>
    <p>スコア：${score} びょう（レベル ${level}）</p>
    <input id="nameInput" maxlength="12" placeholder="なまえ（12もじまで）"
      value="${escapeHTML(playerName)}"
      style="font-family:inherit;font-size:16px;padding:8px 12px;border-radius:10px;border:none;text-align:center;width:200px;">
    <button id="sendBtn">ランキングに とうろく</button>
    <div id="rankArea" style="min-height:40px;"></div>
    <button id="startBtn">もういちど</button>`;

  document.getElementById('startBtn').onclick = start;
  const sendBtn = document.getElementById('sendBtn');
  const nameInput = document.getElementById('nameInput');

  sendBtn.onclick = async () => {
    const nm = (nameInput.value || 'ななし').trim().slice(0,12);
    playerName = nm; localStorage.setItem('poopName', nm);
    sendBtn.textContent = 'とうろく中…'; sendBtn.disabled = true;
    await submitScore(nm, score);
    const rows = await fetchRanking();
    document.getElementById('rankArea').innerHTML = rankingHTML(rows);
    sendBtn.textContent = 'とうろく ずみ ✓';
  };
}

function setX(clientX){
  const rect = game.getBoundingClientRect();
  playerX = Math.max(40, Math.min(W-40, clientX - rect.left));
  player.style.left = playerX + 'px';
}
game.addEventListener('mousemove', e=>{ if(running) setX(e.clientX); });
game.addEventListener('touchmove', e=>{ if(running){ setX(e.touches[0].clientX); e.preventDefault(); } }, {passive:false});
game.addEventListener('touchstart', e=>{ if(running) setX(e.touches[0].clientX); });
window.addEventListener('keydown', e=>{
  if(!running) return;
  const r = game.getBoundingClientRect();
  if(e.key==='ArrowLeft') setX(r.left + playerX - 30);
  if(e.key==='ArrowRight') setX(r.left + playerX + 30);
});

document.getElementById('startBtn').onclick = start;
</script>
</body>
